services:
  app:
    build: .
    ports:
      - "3000:3000"
    depends_on:
      - mongo
    environment:
      MONGODB_URI: "mongodb://mongo:27017/wealthos"
    volumes:
      - .:/app
      - /app/node_modules
      - /app/.next

  mongo:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - ./data/db:/data/db


